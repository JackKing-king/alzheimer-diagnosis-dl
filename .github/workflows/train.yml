name: Train Alzheimer Diagnosis Models

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      model:
        description: '选择要训练的模型'
        required: true
        default: 'cnn'
        type: choice
        options:
          - cnn
          - resnet
          - efficientnet
          - vit
          - all
      epochs:
        description: '训练轮数'
        required: true
        default: '10'
        type: string
      batch_size:
        description: '批次大小'
        required: true
        default: '32'
        type: string
  
  # 定时触发 (每周日凌晨2点)
  schedule:
    - cron: '0 2 * * 0'

env:
  PYTHON_VERSION: '3.11'

jobs:
  train-cnn:
    if: github.event.inputs.model == 'cnn' || github.event.inputs.model == 'all' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt
        
    - name: Download and prepare data
      run: |
        # 这里可以添加数据下载逻辑
        # 例如从 Google Drive 或 AWS S3 下载预处理好的数据
        echo "准备数据..."
        
    - name: Train CNN model
      run: |
        python training/train_cnn.py \
          --data_dir data/splits \
          --output_dir results/cnn \
          --model_name resnet50 \
          --epochs ${{ github.event.inputs.epochs || '10' }} \
          --batch_size ${{ github.event.inputs.batch_size || '32' }} \
          --num_workers 2
          
    - name: Upload training results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: cnn-training-results
        path: |
          results/cnn/checkpoints/
          results/cnn/logs/
          results/cnn/history.json
        retention-days: 30
        
    - name: Upload trained model
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: cnn-model
        path: results/cnn/checkpoints/best_model.pth
        retention-days: 90

  train-resnet:
    if: github.event.inputs.model == 'resnet' || github.event.inputs.model == 'all'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt
        
    - name: Train ResNet model
      run: |
        python training/train_resnet.py \
          --data_dir data/splits \
          --output_dir results/resnet \
          --model_name resnet101 \
          --epochs ${{ github.event.inputs.epochs || '10' }} \
          --batch_size ${{ github.event.inputs.batch_size || '32' }} \
          --num_workers 2
          
    - name: Upload training results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: resnet-training-results
        path: |
          results/resnet/checkpoints/
          results/resnet/logs/
          results/resnet/history.json
        retention-days: 30
        
    - name: Upload trained model
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: resnet-model
        path: results/resnet/checkpoints/best_model.pth
        retention-days: 90

  train-efficientnet:
    if: github.event.inputs.model == 'efficientnet' || github.event.inputs.model == 'all'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt
        
    - name: Train EfficientNet model
      run: |
        python training/train_efficientnet.py \
          --data_dir data/splits \
          --output_dir results/efficientnet \
          --model_name efficientnet_b0 \
          --epochs ${{ github.event.inputs.epochs || '10' }} \
          --batch_size ${{ github.event.inputs.batch_size || '32' }} \
          --num_workers 2
          
    - name: Upload training results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: efficientnet-training-results
        path: |
          results/efficientnet/checkpoints/
          results/efficientnet/logs/
          results/efficientnet/history.json
        retention-days: 30
        
    - name: Upload trained model
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: efficientnet-model
        path: results/efficientnet/checkpoints/best_model.pth
        retention-days: 90

  train-vit:
    if: github.event.inputs.model == 'vit' || github.event.inputs.model == 'all'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt
        
    - name: Train ViT model
      run: |
        python training/train_vit.py \
          --data_dir data/splits \
          --output_dir results/vit \
          --model_name vit_base_patch16_224 \
          --epochs ${{ github.event.inputs.epochs || '10' }} \
          --batch_size ${{ github.event.inputs.batch_size || '16' }} \
          --num_workers 2
          
    - name: Upload training results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: vit-training-results
        path: |
          results/vit/checkpoints/
          results/vit/logs/
          results/vit/history.json
        retention-days: 30
        
    - name: Upload trained model
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: vit-model
        path: results/vit/checkpoints/best_model.pth
        retention-days: 90

  compare-models:
    if: github.event.inputs.model == 'all'
    needs: [train-cnn, train-resnet, train-efficientnet, train-vit]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: results/
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install matplotlib seaborn pandas
        
    - name: Compare models
      run: |
        python evaluation/compare_models.py \
          --results_dir results/ \
          --output_dir comparison/
          
    - name: Upload comparison results
      uses: actions/upload-artifact@v4
      with:
        name: model-comparison
        path: comparison/
        retention-days: 30
