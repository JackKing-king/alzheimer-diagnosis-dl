name: Data Preparation

on:
  workflow_dispatch:
  workflow_call:

env:
  PYTHON_VERSION: '3.11'

jobs:
  prepare-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create data directories
      run: |
        mkdir -p data/raw data/processed data/splits
        
    - name: Check for existing data
      id: check-data
      uses: actions/cache@v4
      with:
        path: data/
        key: alzheimer-data-${{ hashFiles('download_data.py') }}
        
    - name: Download dataset
      if: steps.check-data.outputs.cache-hit != 'true'
      run: |
        # 这里可以添加从 Google Drive、Kaggle 或 S3 下载数据的逻辑
        # 例如使用 gdown 下载 Google Drive 文件
        # pip install gdown
        # gdown --id YOUR_FILE_ID -O data/raw/dataset.zip
        # unzip data/raw/dataset.zip -d data/raw/
        echo "请配置数据下载逻辑"
        echo "可以从以下源下载："
        echo "1. Kaggle: https://www.kaggle.com/datasets/tourist55/alzheimers-dataset-4-class-of-images"
        echo "2. 或上传数据到 GitHub Release/Google Drive/AWS S3"
        
    - name: Preprocess data
      if: steps.check-data.outputs.cache-hit != 'true'
      run: |
        python utils/preprocessing.py \
          --task organize \
          --source_dir data/raw \
          --output_dir data/splits
          
    - name: Upload processed data
      uses: actions/upload-artifact@v4
      with:
        name: processed-data
        path: data/splits/
        retention-days: 7
