name: Data Preparation

on:
  workflow_dispatch:
  workflow_call:

env:
  PYTHON_VERSION: '3.11'

jobs:
  prepare-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install kaggle
        
    - name: Setup Kaggle credentials
      run: |
        mkdir -p ~/.kaggle
        echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
        chmod 600 ~/.kaggle/kaggle.json
        
    - name: Create data directories
      run: |
        mkdir -p data/raw data/processed data/splits
        
    - name: Check for existing data
      id: check-data
      uses: actions/cache@v4
      with:
        path: data/
        key: alzheimer-data-${{ hashFiles('download_data.py') }}
        
    - name: Download dataset from Kaggle
      if: steps.check-data.outputs.cache-hit != 'true'
      run: |
        echo "Downloading Alzheimer's dataset from Kaggle..."
        kaggle datasets download -d tourist55/alzheimers-dataset-4-class-of-images -p data/raw/
        echo "Extracting dataset..."
        unzip -q data/raw/alzheimers-dataset-4-class-of-images.zip -d data/raw/
        echo "Dataset downloaded and extracted successfully!"
        ls -la data/raw/
        
    - name: Preprocess data
      if: steps.check-data.outputs.cache-hit != 'true'
      run: |
        python utils/preprocessing.py \
          --task organize \
          --source_dir data/raw \
          --output_dir data/splits
          
    - name: Upload processed data
      uses: actions/upload-artifact@v4
      with:
        name: processed-data
        path: data/splits/
        retention-days: 7
